<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矩阵图像批量裁剪打包工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #10b981;
            --success-hover: #059669;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
        }

        /* 控制面板 */
        .control-panel {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 45px;
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        input[type="number"] {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
            text-decoration: none;
            margin-top: 1rem;
        }

        .btn-primary { background-color: var(--primary-color); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success-color); }
        .btn-success:hover { background-color: var(--success-hover); }

        /* 工作区 */
        .workspace {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .preview-box {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        .canvas-container {
            max-width: 100%;
            overflow: auto;
            background: #e2e8f0;
            border-radius: 6px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }

        /* 批量结果展示墙 */
        .gallery-box {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .gallery-item {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem;
            text-align: center;
            background: #f8fafc;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            background: #fff;
        }

        .gallery-item span {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
            margin-top: 0.25rem;
        }

        .hint-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>网格图像一键全切工具</h1>
            <p>导入一张大图，瞬间自动切碎成独立的头像格子，并一键打包成 ZIP 下载</p>
        </header>

        <div class="main-layout">
            <div class="control-panel">
                <div class="panel-title">参数设置</div>
                
                <div class="form-group">
                    <label>1. 上传 MBTI 大图</label>
                    <div class="file-upload-wrapper">
                        <span id="fileHint">点击上传图片</span>
                        <input type="file" id="imageInput" accept="image/*">
                    </div>
                </div>

                <div class="form-group">
                    <label>2. 水平切几列</label>
                    <input type="number" id="colsInput" value="4" min="1">
                </div>

                <div class="form-group">
                    <label>3. 垂直切几行</label>
                    <input type="number" id="rowsInput" value="4" min="1">
                </div>

                <button class="btn btn-primary" id="batchCropBtn">⚡ 一键全部裁剪</button>
                <button class="btn btn-success" id="downloadZipBtn" style="display: none;">🎁 打包下载 ZIP 压缩包</button>
                
                <div id="statusText" class="hint-text" style="margin-top: 1rem; font-weight: bold; color: var(--primary-color);"></div>
            </div>

            <div class="workspace">
                <div class="preview-box">
                    <div class="panel-title">大图网格切片预览</div>
                    <div class="canvas-container">
                        <canvas id="sourceCanvas"></canvas>
                    </div>
                </div>

                <div class="gallery-box" id="galleryBox" style="display: none;">
                    <div class="panel-title">裁剪生成的独立头像列表</div>
                    <div class="gallery-grid" id="galleryGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const fileHint = document.getElementById('fileHint');
        const colsInput = document.getElementById('colsInput');
        const rowsInput = document.getElementById('rowsInput');
        const batchCropBtn = document.getElementById('batchCropBtn');
        const downloadZipBtn = document.getElementById('downloadZipBtn');
        const statusText = document.getElementById('statusText');
        
        const sourceCanvas = document.getElementById('sourceCanvas');
        const ctx = sourceCanvas.getContext('2d');
        const galleryBox = document.getElementById('galleryBox');
        const galleryGrid = document.getElementById('galleryGrid');

        let loadedImage = null;
        let croppedImagesData = []; // 存储所有切片的 base64 数据用于打包

        // MBTI 命名映射表（按 4x4 的顺序，从左到右，从上到下排列）
        const mbtiNames = [
            "INTJ_建筑师", "INFJ_提倡者", "INTP_逻辑学家", "INFP_调停者",
            "ENTJ_指挥官", "ENFJ_主人公", "ENTP_辩论家", "ENFP_竞选者",
            "ISTJ_物流师", "ISFJ_守卫者", "ISTP_鉴赏家", "ISFP_探险家",
            "ESTJ_执行官", "ESFJ_执政官", "ESTP_企业家", "ESFP_娱乐者"
        ];

        // 1. 监听图片上传
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            fileHint.textContent = file.name;

            const reader = new FileReader();
            reader.onload = function(event) {
                loadedImage = new Image();
                loadedImage.onload = function() {
                    sourceCanvas.width = loadedImage.width;
                    sourceCanvas.height = loadedImage.height;
                    drawPreviewGrid();
                };
                loadedImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 2. 实时绘制大图与网格线
        function drawPreviewGrid() {
            if (!loadedImage) return;
            ctx.clearRect(0, 0, sourceCanvas.width, sourceCanvas.height);
            ctx.drawImage(loadedImage, 0, 0);

            const cols = parseInt(colsInput.value) || 1;
            const rows = parseInt(rowsInput.value) || 1;
            const cellW = sourceCanvas.width / cols;
            const cellH = sourceCanvas.height / rows;

            ctx.strokeStyle = '#ef4444'; 
            ctx.lineWidth = Math.max(1, sourceCanvas.width / 400); // 动态网格线宽

            for (let i = 1; i < cols; i++) {
                ctx.beginPath(); ctx.moveTo(i * cellW, 0); ctx.lineTo(i * cellW, sourceCanvas.height); ctx.stroke();
            }
            for (let j = 1; j < rows; j++) {
                ctx.beginPath(); ctx.moveTo(0, j * cellH); ctx.lineTo(sourceCanvas.width, j * cellH); ctx.stroke();
            }
        }

        [colsInput, rowsInput].forEach(input => input.addEventListener('input', drawPreviewGrid));

        // 3. 一键批量循环裁剪核心
        batchCropBtn.addEventListener('click', function() {
            if (!loadedImage) { alert('请先上传大图！'); return; }

            const cols = parseInt(colsInput.value) || 1;
            const rows = parseInt(rowsInput.value) || 1;
            const cellW = loadedImage.width / cols;
            const cellH = loadedImage.height / rows;

            // 清空旧数据
            galleryGrid.innerHTML = '';
            croppedImagesData = [];
            
            let index = 0;
            // 嵌套循环双向遍历所有格子
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const resCanvas = document.createElement('canvas');
                    resCanvas.width = cellW;
                    resCanvas.height = cellH;
                    const rCtx = resCanvas.getContext('2d');

                    // 精确切出当前格子的像素坐标
                    rCtx.drawImage(loadedImage, c * cellW, r * cellH, cellW, cellH, 0, 0, cellW, cellH);
                    
                    const dataUrl = resCanvas.toDataURL('image/png');
                    
                    // 为文件名附带名字（如果是标准的 4x4 MBTI 图就自动附带对应人格名）
                    const defaultName = (cols === 4 && rows === 4) ? mbtiNames[index] : `avatar_第${r+1}行_第${c+1}列`;
                    
                    // 存储以便后面打包
                    croppedImagesData.push({
                        name: defaultName + '.png',
                        base64: dataUrl.split(',')[1] // 只要纯数据部分
                    });

                    // 动态创建前端预览墙
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.innerHTML = `<img src="${dataUrl}"><span>${defaultName}</span>`;
                    galleryGrid.appendChild(item);

                    index++;
                }
            }

            galleryBox.style.display = 'block';
            downloadZipBtn.style.display = 'block';
            statusText.textContent = `🎉 成功切出 ${index} 张独立头像！`;
        });

        // 4. 一键打包压缩并下载 ZIP
        downloadZipBtn.addEventListener('click', function() {
            if (croppedImagesData.length === 0) return;

            statusText.textContent = "📦 正在全力打包中，请稍候...";
            const zip = new JSZip();

            // 把所有切片文件塞入虚拟压缩包
            croppedImagesData.forEach(item => {
                zip.file(item.name, item.base64, {base64: true});
            });

            // 生成压缩文件并触发下载
            zip.generateAsync({type: "blob"}).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "MBTI_16种人格高清头像包.zip";
                link.click();
                statusText.textContent = "✅ 下载成功！请检查你的下载文件夹。";
            }).catch(err => {
                statusText.textContent = "❌ 打包失败，请重试。";
                console.error(err);
            });
        });
    </script>
</body>
</html>
