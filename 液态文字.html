<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>液态文本交互排版</title>
    <style>
        body {
            margin: 0;
            background-color: #050508;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #8892b0; /* 常规文本颜色 */
            overflow-x: hidden;
        }

        /* 正常的网页排版容器 */
        .content {
            padding: 100px 10vw;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 需要应用特效的文本标记为 .liquid-text */
        .liquid-text {
            font-size: 80px;
            font-weight: 900;
            margin: 0 0 20px 0;
            line-height: 1.1;
            /* 关键点：将真实 DOM 文本变透明，把舞台让给 Canvas */
            color: transparent; 
            /* 可选：保留选中文本的能力 */
            user-select: text; 
        }

        .subtitle {
            font-size: 24px;
            color: #00f2fe;
            margin-bottom: 40px;
        }

        p {
            font-size: 16px;
            line-height: 1.8;
            max-width: 600px;
        }

        /* 覆盖在最上层的粒子画布 */
        #particle-canvas {
            position: fixed; /* 固定在视口 */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none; /* 让鼠标事件穿透画布，触发下方 DOM 元素的正常交互 */
        }
    </style>
</head>
<body>

    <div class="content">
        <h1 class="liquid-text">INNOVATION</h1>
        <h1 class="liquid-text">BEYOND BOUNDARIES</h1>
        <div class="subtitle">Next Generation Web Design</div>
        <p>
            常规的网页排版在这里。当你的鼠标划过上方巨大的透明标题时，
            覆盖在顶层的 Canvas 画布会接管视觉，展现出极具张力的磁流体物理撕裂效果。
        </p>
    </div>

    <canvas id="particle-canvas"></canvas>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        let particles = [];
        let mouse = { x: -1000, y: -1000, radius: 70 };

        // 监听鼠标在整个网页上的移动
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        // 粒子类：沿用之前的弹簧物理场
        class Particle {
            constructor(x, y, color) {
                // 出生在原位，避免一开始的混乱散落
                this.x = x; 
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.color = color;
                this.size = 2;
                
                this.vx = 0;
                this.vy = 0;
                this.ease = 0.15;     // 弹簧回弹力
                this.friction = 0.85; // 摩擦阻尼
                this.mass = Math.random() * 1.5 + 1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                // 排斥撕裂
                if (distance < mouse.radius) {
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    let pushX = forceDirectionX * force * 15 / this.mass;
                    let pushY = forceDirectionY * force * 15 / this.mass;
                    this.vx -= pushX;
                    this.vy -= pushY;
                }
                
                // 弹簧回位与摩擦减速
                this.vx += (this.originX - this.x) * this.ease;
                this.vy += (this.originY - this.y) * this.ease;
                this.vx *= this.friction;
                this.vy *= this.friction;
                
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        // 初始化：将 DOM 文本转化为粒子
        function initDOMText() {
            particles = [];
            
            // 1. 获取所有带有 .liquid-text 的 DOM 元素
            const textElements = document.querySelectorAll('.liquid-text');
            
            // 2. 清空画布，准备离屏绘制
            ctx.clearRect(0, 0, width, height);
            
            textElements.forEach(el => {
                // 获取元素在屏幕上的精确位置和尺寸
                const rect = el.getBoundingClientRect();
                const text = el.innerText;
                const computedStyle = window.getComputedStyle(el);
                
                // 设置 Canvas 字体以匹配 DOM
                ctx.font = `${computedStyle.fontWeight} ${computedStyle.fontSize} ${computedStyle.fontFamily}`;
                ctx.fillStyle = '#ffffff'; // 粒子的基础颜色
                ctx.textBaseline = 'top';
                
                // 3. 将文字画到 Canvas 上，坐标与 DOM 完全对齐
                ctx.fillText(text, rect.left, rect.top);
            });
            
            // 4. 像素采样生成粒子
            const imgData = ctx.getImageData(0, 0, width, height).data;
            const step = 2; // 采样密度
            
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    const idx = (y * width + x) * 4;
                    const alpha = imgData[idx + 3];
                    
                    if (alpha > 128) {
                        particles.push(new Particle(x, y, '#ffffff'));
                    }
                }
            }
            
            // 采样完成后清空画布，进入动画循环状态
            ctx.clearRect(0, 0, width, height);
        }

        // 窗口尺寸改变时，需要重新计算坐标
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initDOMText();
        });

        // 动画主循环
        function animate() {
            // 清空画布（这里必须用 clearRect 而不是 fillRect，因为画布是透明的，要露出下方的 DOM）
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        // 确保字体加载完毕后再初始化
        document.fonts.ready.then(() => {
            initDOMText();
            animate();
        });
    </script>
</body>
</html>
