<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性格测试 - Apple 风格</title>
    <style>
        :root {
            --bg-primary: #fbfbfd;
            --bg-secondary: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #6e6e73;
            --accent-blue: #0071e3;
            --accent-blue-light: #e8f4fd;
            --accent-green: #34c759;
            --accent-purple: #af52de;
            --accent-pink: #ff375f;
            --border-subtle: rgba(0, 0, 0, 0.06);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.1);
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", Helvetica, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        /* 顶部导航 */
        .header {
            padding: 0 40px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(251, 251, 253, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .question-counter {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .question-counter span {
            color: var(--accent-blue);
            font-weight: 600;
        }

        /* 进度条容器 */
        .progress-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--bg-secondary);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0 2px 2px 0;
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.08) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
        }

        .bg-decoration-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(118, 75, 162, 0.06) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            pointer-events: none;
        }

        /* 卡片容器 */
        .card-container {
            width: 100%;
            max-width: 800px;
            position: relative;
            perspective: 1000px;
        }

        /* 问题卡片 */
        .question-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 56px 64px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
        }

        .question-card.slide-out-left {
            opacity: 0;
            transform: translateX(-60px) scale(0.96) rotateY(5deg);
            pointer-events: none;
        }

        .question-card.slide-in-right {
            opacity: 0;
            transform: translateX(60px) scale(0.96) rotateY(-5deg);
            pointer-events: none;
        }

        /* 题目标签 */
        .question-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-blue-light);
            color: var(--accent-blue);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 16px;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .question-badge svg {
            width: 14px;
            height: 14px;
        }

        /* 问题文本 */
        .question-text {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.5;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 48px;
        }

        /* 选择器容器 */
        .scale-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 选择器标签 */
        .scale-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 8px;
        }

        .scale-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scale-label.agree {
            color: var(--accent-green);
        }

        .scale-label.disagree {
            color: var(--accent-purple);
        }

        .label-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .agree .label-icon {
            background: rgba(52, 199, 89, 0.15);
        }

        .disagree .label-icon {
            background: rgba(175, 82, 222, 0.15);
        }

        /* 选项容器 */
        .scale-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 0 4px;
        }

        /* 选项按钮 */
        .option-btn {
            appearance: none;
            -webkit-appearance: none;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            outline: none;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: transparent;
            transition: all 0.3s ease;
        }

        .option-btn:hover::before {
            background: rgba(0, 113, 227, 0.08);
        }

        /* 不同权重的按钮大小 */
        .option-btn[data-weight="3"], 
        .option-btn[data-weight="-3"] { 
            width: 48px; 
            height: 48px;
            font-size: 16px;
            font-weight: 600;
        }

        .option-btn[data-weight="2"], 
        .option-btn[data-weight="-2"] { 
            width: 40px; 
            height: 40px;
            font-size: 14px;
            font-weight: 600;
        }

        .option-btn[data-weight="1"], 
        .option-btn[data-weight="-1"] { 
            width: 32px; 
            height: 32px;
            font-size: 12px;
            font-weight: 600;
        }

        .option-btn[data-weight="0"] { 
            width: 28px; 
            height: 28px;
            font-size: 11px;
            font-weight: 600;
            border: 2px solid var(--text-tertiary);
        }

        /* 默认状态 */
        .option-btn {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 2px solid transparent;
        }

        /* 悬停状态 */
        .option-btn:hover {
            transform: scale(1.15);
            color: var(--text-primary);
        }

        /* 选中状态 - 同意 */
        .option-btn.selected[data-weight="3"],
        .option-btn.selected[data-weight="2"],
        .option-btn.selected[data-weight="1"] {
            background: linear-gradient(135deg, #34c759, #30d158);
            color: white;
            box-shadow: 0 8px 20px rgba(52, 199, 89, 0.35);
            transform: scale(1.1);
        }

        /* 选中状态 - 反对 */
        .option-btn.selected[data-weight="-3"],
        .option-btn.selected[data-weight="-2"],
        .option-btn.selected[data-weight="-1"] {
            background: linear-gradient(135deg, #af52de, #bf5af2);
            color: white;
            box-shadow: 0 8px 20px rgba(175, 82, 222, 0.35);
            transform: scale(1.1);
        }

        /* 选中状态 - 中立 */
        .option-btn.selected[data-weight="0"] {
            background: var(--text-secondary);
            color: white;
            border-color: var(--text-secondary);
            box-shadow: 0 6px 16px rgba(110, 110, 115, 0.3);
            transform: scale(1.1);
        }

        /* 按钮点击波纹效果 */
        .option-btn:active {
            transform: scale(0.95);
        }

        /* 底部操作区 */
        .actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 40px;
        }

        .btn {
            font-size: 15px;
            font-weight: 500;
            padding: 14px 28px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-prev {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .btn-prev:hover {
            background: #e8e8ed;
            color: var(--text-primary);
        }

        .btn-prev:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-prev:disabled:hover {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                padding: 0 20px;
                height: 56px;
            }

            .logo {
                font-size: 16px;
            }

            .logo-icon {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }

            .question-counter {
                font-size: 12px;
                padding: 6px 12px;
            }

            .main-content {
                padding: 30px 20px;
            }

            .question-card {
                padding: 36px 28px;
                border-radius: 24px;
            }

            .question-text {
                font-size: 22px;
                margin-bottom: 36px;
            }

            .option-btn[data-weight="3"], 
            .option-btn[data-weight="-3"] { 
                width: 40px; 
                height: 40px;
            }

            .option-btn[data-weight="2"], 
            .option-btn[data-weight="-2"] { 
                width: 34px; 
                height: 34px;
            }

            .option-btn[data-weight="1"], 
            .option-btn[data-weight="-1"] { 
                width: 28px; 
                height: 28px;
            }

            .option-btn[data-weight="0"] { 
                width: 24px; 
                height: 24px;
            }

            .scale-label span {
                display: none;
            }
        }

        /* 动画关键帧 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .question-card {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">M</div>
            <span>性格测试</span>
        </div>
        <div class="question-counter">
            问题 <span id="current-q">1</span> / <span id="total-q">5</span>
        </div>
        <div class="progress-wrapper">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </header>

    <main class="main-content">
        <div class="bg-decoration"></div>
        <div class="bg-decoration-2"></div>
        
        <div class="card-container" id="card-container">
            <!-- 卡片由 JS 动态渲染 -->
        </div>

        <div class="actions">
            <button class="btn btn-prev" id="btn-prev" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                返回上一题
            </button>
        </div>
    </main>

    <script>
        // 模拟测试题库
        const questions = [
            "在大型社交聚会中，你通常倾向于结交新朋友，而不是只和认识的人交谈。",
            "你更喜欢遵循明确的计划和时间表，而不是随性而为地安排生活。",
            "在做重要决定时，你认为逻辑分析比个人情感和价值观更重要。",
            "即使在面临巨大压力时，你也能保持冷静和专注。",
            "你经常花时间去思考宇宙的起源或人类存在的哲学意义。"
        ];

        let currentIndex = 0;
        let answers = new Array(questions.length).fill(null);

        const container = document.getElementById('card-container');
        const progressBar = document.getElementById('progress-bar');
        const btnPrev = document.getElementById('btn-prev');
        const currentQSpan = document.getElementById('current-q');
        const totalQSpan = document.getElementById('total-q');

        // 初始化
        function init() {
            totalQSpan.textContent = questions.length;
            renderCard(currentIndex, 'initial');
            updateUI();
        }

        // 渲染卡片
        function renderCard(index, direction) {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            if (direction === 'next') card.classList.add('slide-in-right');
            if (direction === 'prev') card.classList.add('slide-out-left');

            card.innerHTML = `
                <div class="question-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    第 ${index + 1} 题
                </div>
                <h2 class="question-text">${questions[index]}</h2>
                <div class="scale-container">
                    <div class="scale-labels">
                        <div class="scale-label agree">
                            <span class="label-icon">✓</span>
                            <span>完全同意</span>
                        </div>
                        <div class="scale-label disagree">
                            <span class="label-icon">✕</span>
                            <span>完全反对</span>
                        </div>
                    </div>
                    <div class="scale-options">
                        <button class="option-btn" data-weight="3" onclick="selectOption(${index}, 3, this)">3</button>
                        <button class="option-btn" data-weight="2" onclick="selectOption(${index}, 2, this)">2</button>
                        <button class="option-btn" data-weight="1" onclick="selectOption(${index}, 1, this)">1</button>
                        <button class="option-btn" data-weight="0" onclick="selectOption(${index}, 0, this)">0</button>
                        <button class="option-btn" data-weight="-1" onclick="selectOption(${index}, -1, this)">-1</button>
                        <button class="option-btn" data-weight="-2" onclick="selectOption(${index}, -2, this)">-2</button>
                        <button class="option-btn" data-weight="-3" onclick="selectOption(${index}, -3, this)">-3</button>
                    </div>
                </div>
            `;

            if (answers[index] !== null) {
                const btns = card.querySelectorAll('.option-btn');
                btns.forEach(btn => {
                    if (parseInt(btn.dataset.weight) === answers[index]) {
                        btn.classList.add('selected');
                    }
                });
            }

            container.appendChild(card);

            requestAnimationFrame(() => {
                card.classList.remove('slide-in-right', 'slide-out-left');
                card.style.transform = 'translateX(0)';
            });
        }

        // 选择选项
        window.selectOption = function(qIndex, weight, btnElement) {
            const currentCard = container.lastChild;
            const btns = currentCard.querySelectorAll('.option-btn');
            btns.forEach(btn => btn.classList.remove('selected'));
            
            btnElement.classList.add('selected');
            answers[qIndex] = weight;
            updateUI();

            setTimeout(() => {
                if (currentIndex < questions.length - 1) {
                    goToNext();
                } else {
                    alert("测试完成！系统正在生成您的专属性格解析报告。");
                }
            }, 500);
        };

        // 下一题
        function goToNext() {
            if (currentIndex >= questions.length - 1) return;
            
            const oldCard = container.lastChild;
            oldCard.classList.add('slide-out-left');
            
            setTimeout(() => {
                oldCard.remove();
            }, 600);

            currentIndex++;
            renderCard(currentIndex, 'next');
            updateUI();
        }

        // 上一题
        function goToPrev() {
            if (currentIndex <= 0) return;

            const oldCard = container.lastChild;
            oldCard.style.transform = 'translateX(60px) scale(0.96)';
            oldCard.style.opacity = '0';
            
            setTimeout(() => {
                oldCard.remove();
            }, 600);

            currentIndex--;
            renderCard(currentIndex, 'prev');
            updateUI();
        }

        // 更新UI
        function updateUI() {
            const progress = ((currentIndex + 1) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;
            
            btnPrev.disabled = currentIndex === 0;
            currentQSpan.textContent = currentIndex + 1;
        }

        btnPrev.addEventListener('click', goToPrev);

        init();
    </script>
</body>
</html>
