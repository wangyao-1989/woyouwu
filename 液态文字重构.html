<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高清液态排版交互</title>
    <style>
        /* 浅色温馨主题 */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #fdfbf7; 
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 粒子画布，铺在底层 */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        /* 真实的 DOM 交互层 */
        .ui-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none; /* 允许鼠标穿透到底层画布进行撕裂交互 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10vw; 
        }

        /* 占位大标题：保留原生的 SEO 和屏幕阅读器可读性，
           但视觉上设为透明，把舞台留给底层的粒子动画 
        */
        .liquid-title {
            font-size: 76px;
            font-weight: 900;
            line-height: 1.2;
            color: transparent; /* 关键：隐身 */
            margin: 0 0 40px 0;
            user-select: none;
        }

        /* 副标题：恢复鼠标事件，保持原生 HTML 渲染，绝对高清无锯齿 */
        .subtitle-group {
            pointer-events: auto;
            color: #6b7280;
            margin-bottom: 40px;
        }

        .subtitle-group p {
            font-size: 20px;
            margin: 0 0 12px 0;
        }

        .subtitle-group .small {
            font-size: 16px;
            color: #9ca3af;
        }

        /* 按钮组 */
        .button-group {
            pointer-events: auto;
            display: flex;
            gap: 16px;
        }

        button {
            padding: 14px 28px; font-size: 16px; font-weight: 600;
            border-radius: 8px; cursor: pointer; transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background-color: #8b6b52; color: #ffffff; border: none;
            box-shadow: 0 4px 12px rgba(139, 107, 82, 0.3);
        }
        .btn-primary:hover {
            background-color: #7a5a41; transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 107, 82, 0.4);
        }

        .btn-secondary {
            background-color: #ffffff; color: #555; border: 1px solid #eaeaea;
        }
        .btn-secondary:hover { border-color: #ccc; color: #222; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="ui-container">
        <h1 class="liquid-title" id="dom-title">
            藏在心里是光，<br>走出来就是星芒。
        </h1>
        
        <div class="subtitle-group">
            <p>你的随手分享，或许正照亮某人的夜空。</p>
            <p class="small">因物而见，因悟而明！</p>
        </div>

        <div class="button-group">
            <button class="btn-primary">我要发布 ✨</button>
            <button class="btn-secondary">刷新内容 ↻</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { alpha: false, willReadFrequently: true });
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let particlesArray = [];
        let mouse = { x: -1000, y: -1000, radius: 90 }; 

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            createTextParticles(); 
        });

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.originX = x; this.originY = y;
                this.color = color;
                
                // 极细的粒子尺寸，配合 step=1 达到视网膜级别的清晰度
                this.size = 1.2; 
                
                this.vx = 0; this.vy = 0;
                this.ease = 0.12; 
                this.friction = 0.85; 
                this.mass = Math.random() * 2 + 1; 
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
            update() {
                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    let forceDirectionX = dx / distance; let forceDirectionY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    let pushX = forceDirectionX * force * 15 / this.mass;
                    let pushY = forceDirectionY * force * 15 / this.mass;
                    this.vx -= pushX; this.vy -= pushY;
                }
                this.vx += (this.originX - this.x) * this.ease;
                this.vy += (this.originY - this.y) * this.ease;
                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx; this.y += this.vy;
            }
        }

        function createTextParticles() {
            particlesArray = [];
            const offCanvas = document.createElement('canvas');
            offCanvas.width = width; offCanvas.height = height;
            const offCtx = offCanvas.getContext('2d');
            
            // 动态读取 DOM 中大标题的位置，确保粒子与排版严丝合缝
            const titleEl = document.getElementById('dom-title');
            const rect = titleEl.getBoundingClientRect();
            
            // 计算第一行和第二行的 Y 轴位置 (基于行高)
            const lineHeight = 76 * 1.2; 
            const textY1 = rect.top + 10; // 微调视觉对齐
            const textY2 = rect.top + lineHeight + 10;
            
            offCtx.fillStyle = '#1e2432'; 
            offCtx.font = '900 76px "PingFang SC", sans-serif';
            offCtx.textBaseline = 'top';
            
            // 绘制
            offCtx.fillText('藏在心里是光，', rect.left, textY1);
            offCtx.fillText('走出来就是星芒。', rect.left, textY2);

            const imgData = offCtx.getImageData(0, 0, width, height).data;
            
            // 将采样率调至极限 step = 1，牺牲一点性能换取极致的平滑边缘
            const step = 1; 
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    const idx = (y * width + x) * 4;
                    const alpha = imgData[idx + 3];

                    // 使用较低的 Alpha 阈值，保留抗锯齿的灰色边缘
                    if (alpha > 40) {
                        const color = `rgba(30, 36, 50, ${alpha / 255})`;
                        particlesArray.push(new Particle(x, y, color));
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = '#fdfbf7';
            ctx.fillRect(0, 0, width, height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        document.fonts.ready.then(() => {
            createTextParticles();
            animate();
        });
    </script>
</body>
</html>
