<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Preview</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #FFF8E1 0%, #FFECB3 100%);
      font-family: 'Comic Sans MS', cursive;
    }
    .logo-container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    .logo-preview {
      display: block;
      margin: 0 auto;
    }
    .sizes {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    .size-item {
      text-align: center;
    }
    h1 {
      color: #FF8F00;
      font-size: 24px;
      margin-bottom: 10px;
    }
    p {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Logo Preview</h1>
  <div class="logo-container">
    <img src="/src/assets/logo.svg" alt="Logo" class="logo-preview" width="200" height="100" />
  </div>
  
  <div class="sizes">
    <div class="size-item">
      <img src="/src/assets/logo.svg" alt="Logo 48px" width="96" height="48" />
      <p>96x48px</p>
    </div>
    <div class="size-item">
      <img src="/src/assets/logo.svg" alt="Logo 64px" width="128" height="64" />
      <p>128x64px</p>
    </div>
    <div class="size-item">
      <img src="/src/assets/logo.svg" alt="Logo 80px" width="160" height="80" />
      <p>160x80px</p>
    </div>
  </div>
</body>
</html>
