<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录场景测试 - UI 修复验证</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-50 to-indigo-100 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- 登录卡片 -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <!-- Logo 图标 - 使用 SVG -->
                <div class="inline-flex items-center justify-center w-16 h-16 bg-purple-100 rounded-2xl mb-4">
                    <svg class="w-10 h-10 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">欢迎回来</h1>
                <p class="text-gray-500 mt-2">请登录您的账户</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <!-- 用户名输入框 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        用户名
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input
                            type="text"
                            id="username"
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all"
                            placeholder="请输入用户名"
                            value="admin"
                        />
                    </div>
                </div>

                <!-- 密码输入框 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        密码
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input
                            type="password"
                            id="password"
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all"
                            placeholder="请输入密码"
                            value="password123"
                        />
                    </div>
                </div>

                <!-- 记住我和忘记密码 -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-2 text-sm text-gray-600">记住我</span>
                    </label>
                    <button
                        type="button"
                        class="text-sm text-purple-600 hover:text-purple-700 font-medium active:scale-95 transition-all"
                    >
                        忘记密码？
                    </button>
                </div>

                <!-- 登录按钮 - 主要操作按钮 -->
                <button
                    type="submit"
                    id="loginBtn"
                    class="w-full px-6 py-3 bg-[#4A3728] text-white font-medium rounded-xl hover:bg-[#3A2A1E] active:scale-95 transition-all shadow-lg shadow-[#4A3728]/30"
                >
                    登录
                </button>

                <!-- 其他登录方式 -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">或</span>
                    </div>
                </div>

                <!-- 第三方登录按钮组 -->
                <div class="grid grid-cols-3 gap-3">
                    <button
                        type="button"
                        class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-xl hover:bg-gray-50 active:scale-95 transition-all"
                    >
                        <svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/>
                        </svg>
                    </button>

                    <button
                        type="button"
                        class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-xl hover:bg-gray-50 active:scale-95 transition-all"
                    >
                        <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M9,8c-1.66,0-3,1.34-3,3s1.34,3,3,3s3-1.34,3-3S10.66,8,9,8z M21,12c0,2.67-5.33,4-8,4c-3.31,0-6-2.69-6-6h2c0,2.21,1.79,4,4,4s4-1.79,4-4c0-0.99-0.36-1.9-0.97-2.63L9.44,7.91C10.35,7.45,11.15,7,12,7c2.76,0,5,2.24,5,5v0.5H21V12z M3,12c0,2.21,1.79,4,4,4h6v-4H7C5.34,12,3,10.66,3,12z"/>
                        </svg>
                    </button>

                    <button
                        type="button"
                        class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-xl hover:bg-gray-50 active:scale-95 transition-all"
                    >
                        <svg class="w-5 h-5 text-gray-700" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12,11.5A2.5,2.5 0 0,1 9.5,9A2.5,2.5 0 0,1 12,6.5A2.5,2.5 0 0,1 14.5,9A2.5,2.5 0 0,1 12,11.5M12,2A7,7 0 0,0 5,9C5,14.25 12,22 12,22S19,14.25 19,9A7,7 0 0,0 12,2Z"/>
                        </svg>
                    </button>
                </div>
            </form>

            <!-- 注册提示 -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    还没有账户？
                    <button
                        type="button"
                        class="font-medium text-purple-600 hover:text-purple-700 active:scale-95 transition-all"
                    >
                        立即注册
                    </button>
                </p>
            </div>
        </div>

        <!-- 状态提示区域 -->
        <div id="statusArea" class="mt-6 space-y-3"></div>

        <!-- 测试结果展示 -->
        <div class="mt-6 bg-white/50 backdrop-blur-sm rounded-xl p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                <svg class="w-5 h-5 mr-2 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
                验证项目
            </h3>
            <div class="space-y-2 text-sm">
                <div class="flex items-start">
                    <svg class="w-5 h-5 text-green-500 mr-2 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    <span class="text-gray-700">✓ 所有按钮均使用 SVG 图标替代 emoji</span>
                </div>
                <div class="flex items-start">
                    <svg class="w-5 h-5 text-green-500 mr-2 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    <span class="text-gray-700">✓ 所有按钮添加 active:scale-95 按压反馈</span>
                </div>
                <div class="flex items-start">
                    <svg class="w-5 h-5 text-green-500 mr-2 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    <span class="text-gray-700">✓ 按钮 hover 状态平滑过渡</span>
                </div>
                <div class="flex items-start">
                    <svg class="w-5 h-5 text-green-500 mr-2 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    <span class="text-gray-700">✓ 阴影效果增强按钮立体感</span>
                </div>
                <div class="flex items-start">
                    <svg class="w-5 h-5 text-green-500 mr-2 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    <span class="text-gray-700">✓ 图标大小和颜色统一管理</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 登录表单提交
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const statusArea = document.getElementById('statusArea');

        function showStatus(message, type = 'info') {
            const colors = {
                info: 'bg-blue-50 border-blue-200 text-blue-800',
                success: 'bg-green-50 border-green-200 text-green-800',
                error: 'bg-red-50 border-red-200 text-red-800',
                warning: 'bg-yellow-50 border-yellow-200 text-yellow-800'
            };

            const icons = {
                info: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>',
                success: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>',
                error: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>',
                warning: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>'
            };

            const statusDiv = document.createElement('div');
            statusDiv.className = `flex items-center p-4 rounded-lg border ${colors[type]} fade-in`;
            statusDiv.innerHTML = `${icons[type]}<span class="ml-3">${message}</span>`;
            statusArea.appendChild(statusDiv);

            setTimeout(() => {
                statusDiv.style.opacity = '0';
                statusDiv.style.transition = 'opacity 0.3s';
                setTimeout(() => statusDiv.remove(), 300);
            }, 3000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            // 禁用按钮并显示加载状态
            loginBtn.disabled = true;
            const originalText = loginBtn.textContent;
            loginBtn.innerHTML = `
                <svg class="animate-spin inline w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                登录中...
            `;

            showStatus(`正在验证用户: ${username} (记住我: ${remember})`, 'info');

            // 模拟登录请求
            await new Promise(resolve => setTimeout(resolve, 1500));

            // 模拟登录成功
            loginBtn.innerHTML = `
                <svg class="inline w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
                登录成功
            `;
            loginBtn.classList.remove('bg-[#4A3728]', 'hover:bg-[#3A2A1E]');
            loginBtn.classList.add('bg-green-600', 'hover:bg-green-700');

            showStatus(`✓ 欢迎回来，${username}！您已成功登录。`, 'success');

            // 3秒后恢复按钮状态
            setTimeout(() => {
                loginBtn.disabled = false;
                loginBtn.textContent = originalText;
                loginBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
                loginBtn.classList.add('bg-[#4A3728]', 'hover:bg-[#3A2A1E]');
            }, 3000);
        });

        // 为所有按钮添加按压反馈日志
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                console.log(`按钮按压: ${button.textContent.trim()}`);
            });

            button.addEventListener('touchstart', () => {
                console.log(`触摸按压: ${button.textContent.trim()}`);
            });
        });

        // 初始提示
        showStatus('👆 请点击登录按钮测试按压反馈效果', 'info');
    </script>
</body>
</html>
